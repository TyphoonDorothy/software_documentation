version: '3.8'

services:
  # 1. Redis Setup
  redis:
    image: redis:latest
    container_name: local-redis
    ports:
      - "6379:6379"

  # 2. Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.2  # <-- Changed from latest
    container_name: local-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  # 3. Kafka Setup
  kafka:
    image: confluentinc/cp-kafka:7.3.2      # <-- Changed from latest
    container_name: local-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1