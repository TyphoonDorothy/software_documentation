{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h2 class="mb-4">{{ 'Edit' if listing else 'Add' }} Property</h2>
            
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Property Title</label>
                    <input type="text" name="title" class="form-control" 
                           value="{{ listing.title if listing else '' }}" required placeholder="e.g. Cozy Studio">
                </div>

                <div class="mb-3">
                    <label class="form-label">Price per Night ($)</label>
                    <input type="number" step="0.01" name="price" class="form-control" 
                           value="{{ listing.pricePerNight if listing else '' }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Location</label>
                    <input type="text" name="location" class="form-control" 
                           value="{{ listing.location if listing else '' }}" placeholder="City, Country">
                </div>

                <div class="mb-3">
                    <label class="form-label">Max Guests</label>
                    <input type="number" name="maxGuests" class="form-control" 
                           value="{{ listing.maxGuests if listing else '1' }}">
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success">
                        {{ 'Update Changes' if listing else 'Save Listing' }}
                    </button>
                    <a href="/" class="btn btn-light border">Back to List</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
